{% extends "base.html" %}
{% block title %}Login -- Meridian PPM{% endblock %}
{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <h1>Meridian PPM</h1>
    <p class="subtitle">Enter your 6-digit authenticator code.</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post" action="{{ url_for('login') }}">
      <input type="text" name="code" inputmode="numeric" autocomplete="one-time-code"
             pattern="[0-9]*" maxlength="6" placeholder="000000" autofocus>
      <button class="btn btn-primary" type="submit" style="width:100%;">Authenticate</button>
    </form>
  </div>
</div>
{% endblock %}
